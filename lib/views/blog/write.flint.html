{{ extends('layouts.app') }}

{{ section('content') }}
<section class="mx-auto w-full max-w-4xl px-4 py-12 sm:py-16">
    <div class="content-header space-y-4 rounded-2xl border border-slate-800/70 bg-gradient-to-br from-slate-900/70 via-slate-950/70 to-slate-900/40 p-6 shadow-[0_0_0_1px_rgba(15,23,42,0.2)]">
        <div class="flex flex-wrap items-center gap-3 text-xs font-semibold uppercase tracking-[0.2em] text-emerald-300/80">
            <span class="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1">Blog</span>
            <span class="text-slate-500">New Post</span>
        </div>
        <h1 class="text-3xl font-semibold text-white sm:text-4xl">Write a Blog Post</h1>
        <p class="text-slate-400">Share updates, guides, and best practices with the Flint community.</p>
    </div>

    <form id="blog-write-form" class="mt-8 grid gap-4 rounded-2xl border border-slate-800/70 bg-slate-900/40 p-6 shadow-[0_0_0_1px_rgba(15,23,42,0.2)]" method="post" action="/blog/write" novalidate>
        <div id="blog-write-error" class="hidden rounded-lg border border-red-500/40 bg-red-500/10 px-3 py-2 text-xs text-red-200"></div>
        <div class="grid gap-2">
            <label class="text-sm text-slate-300">Title</label>
            <input name="title" type="text" required class="w-full rounded-xl border border-slate-800 bg-slate-950/60 p-3 text-sm text-slate-100 focus:border-emerald-400 focus:outline-none" placeholder="Clear, descriptive title" />
        </div>
        <div class="grid gap-2">
            <label class="text-sm text-slate-300">Tag</label>
            <input name="tag" type="text" required class="w-full rounded-xl border border-slate-800 bg-slate-950/60 p-3 text-sm text-slate-100 focus:border-emerald-400 focus:outline-none" placeholder="Release, Guide, Performance..." />
        </div>
        <div class="grid gap-2">
            <label class="text-sm text-slate-300">Body</label>
            <textarea name="body" rows="10" required class="w-full rounded-xl border border-slate-800 bg-slate-950/60 p-3 text-sm text-slate-100 focus:border-emerald-400 focus:outline-none" placeholder="Write the full post..."></textarea>
        </div>
        <button type="submit" class="w-fit rounded-lg bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-emerald-300">
            Publish Post
        </button>
    </form>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('blog-write-form');
        const error = document.getElementById('blog-write-error');
        if (!form) return;
        form.addEventListener('submit', (event) => {
          if (!form.checkValidity()) {
            event.preventDefault();
            if (error) {
              error.textContent = 'Please complete all fields before publishing.';
              error.classList.remove('hidden');
            }
          }
        });
      });
    </script>
</section>
{{ endsection }}
