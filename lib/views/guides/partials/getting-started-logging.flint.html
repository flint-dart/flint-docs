<section id="logging" class="section">
    <h2>Logging</h2>
    <p>
        Use <code>Log</code> for consistent framework logging and levels.
    </p>

    <h3>Basic Usage</h3>
    <div class="code-block">
        <pre><code class="language-dart">Log.debug('Debug message');
Log.info('Server started');
Log.warning('Something looks off');
Log.error('Request failed', error: e);</code></pre>
    </div>

    <p class="text-sm text-slate-400">
        Levels: <code>debug</code>, <code>info</code>, <code>warning</code>, <code>error</code>, <code>critical</code>.
    </p>
</section>
