<section id="installation" class="section">
    <h2>Install</h2>
    <h3>Install the CLI</h3>
    <div class="code-block">
        <pre><code class="language-bash">dart pub global activate flint_dart</code></pre>
    </div>

    <h3>Add to an existing project</h3>
    <div class="code-block">
        <pre><code class="language-bash">dart pub add flint_dart</code></pre>
    </div>
</section>
